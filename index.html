<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonar+ Radio</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#050816;
color:white;
overflow-x:hidden;
}

/* PLAYER */

.player{
position:relative;
text-align:center;
padding:35px 15px;
overflow:hidden;
border-radius:20px;
margin:10px;
background:#111936;
}

/* FONDO PLAYER */

.player::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-image:var(--bg);
background-size:cover;
background-position:center;
filter:blur(7px);
transform:scale(1.05);
opacity:.42;
z-index:0;
}

.player::after{
content:"";
position:absolute;
inset:0;
background:rgba(5,8,22,.72);
z-index:1;
}

.player *{
position:relative;
z-index:2;
}

/* LOGO */

.logo{
width:95px;
margin:0 auto 10px;
display:block;
}

/* TEMPERATURA */

.weather{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
font-size:14px;
margin-bottom:12px;
color:#00d5ff;
}

/* EN VIVO */

.live{
background:#ff2d55;
padding:6px 14px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-bottom:10px;
font-weight:bold;
}

/* TITULOS */

#progActual{
margin:5px 0;
font-size:30px;
}

#locActual{
margin-top:0;
color:#00d5ff;
font-size:14px;
}

/* PLAY */

.btn-play{
margin:20px auto 10px;
width:78px;
height:78px;
border-radius:50%;
background:linear-gradient(135deg,#00d5ff,#6f00ff);
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 30px rgba(0,213,255,.5);
}

.btn-play.stop{
background:linear-gradient(135deg,#ff0048,#ff2d55);
}

/* VUMETRO */

.vu{
display:flex;
justify-content:center;
align-items:flex-end;
gap:4px;
height:40px;
margin-top:10px;
}

.vu span{
width:5px;
height:10px;
border-radius:20px;
background:#00d5ff;
animation:vu 1s infinite ease-in-out;
}

.vu span:nth-child(2){animation-delay:.1s}
.vu span:nth-child(3){animation-delay:.2s}
.vu span:nth-child(4){animation-delay:.3s}
.vu span:nth-child(5){animation-delay:.4s}
.vu span:nth-child(6){animation-delay:.5s}

@keyframes vu{
0%{height:8px}
50%{height:35px}
100%{height:8px}
}

/* TOP */

.top3{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.box{
min-width:170px;
background:#101935;
border-radius:18px;
padding:15px;
position:relative;
overflow:hidden;
}

.box::before{
content:"";
position:absolute;
inset:0;
background-image:var(--cardbg);
background-size:cover;
background-position:center;
filter:blur(2px);
transform:scale(1.05);
opacity:.35;
}

.box *{
position:relative;
z-index:2;
}

.estado{
font-size:11px;
margin-bottom:8px;
color:#00d5ff;
font-weight:bold;
}

.activo{
outline:2px solid #ff2d55;
}

/* PROGRAMACION */

.semana{
padding:10px;
}

.dia{
margin-bottom:20px;
background:#0f1731;
border-radius:16px;
padding:15px;
}

.dia h3{
margin-top:0;
color:#00d5ff;
font-size:20px;
}

.item{
padding:9px;
border-radius:8px;
font-size:14px;
margin-bottom:4px;
background:rgba(255,255,255,.03);
}

.activoProg{
background:rgba(0,213,255,.15);
color:#00d5ff;
font-weight:bold;
}

</style>
</head>

<body>

<div class="player">

<img class="logo" src="https://i.imgur.com/CEC8OUS.png">

<div class="weather" id="weather">
📍 Detectando ciudad...
</div>

<div class="live">
🔴 AHORA EN VIVO
</div>

<h2 id="progActual">
Cargando...
</h2>

<p id="locActual"></p>

<div class="btn-play" onclick="toggleRadio()" id="btnPlay">
▶
</div>

<div class="vu">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

</div>

<audio id="radio" src="https://stream.zeno.fm/sctgo3gppjhtv"></audio>

<div class="top3" id="top3"></div>

<div class="semana" id="semana"></div>

<script>

}

{h:12,n:"Melodías conocidas",l:"Sonar+",img:"https://i.imgur.com/825uO29.jpg"},

{h:15,n:"Estudio Mega",l:"Matías Toledo",img:"https://i.imgur.com/gWBATYu.png"},

],

{h:9,n:"Ecos del Alma",l:"Valeria Mitelman",img:"https://i.imgur.com/wdWp1WC.png"},

{h:14,n:"La Puerta de al Lado",l:"Diego Mait",img:"https://public-rf-upload.minhawebradio.net/250778/broadcaster/f4cf51e03251c936d02faa3ed861c5ae.jpgg"},

{h:16,n:"Versiones",l:"Mili Pouzo",img:"https://i.imgur.com/gWBATYu.png"},

{h:18,n:"Buenas Noticias",l:"Kily Cortes",img:"https://i.imgur.com/PpQ2DvJ.png"},

{h:22,n:"Ranking Sonar+",l:"Gabriel Retamozo",img:"https://i.imgur.com/OSy7BbG.png"},

{h:23.5,n:"Radio Mix",l:"DJ Mono",img:"https://i.imgur.com/i8DorBr.jpg"},

{h:25.5,n:"Trasnoche Finde",l:"Sonar+",img:"https://i.imgur.com/Ewf4K3q.png"}

],


"Domingo":[

{h:6,n:"América y su Folklore",l:"Nicolás Fernandez"},
{h:8,n:"Nuestro Día",l:"Miguel Calderón"},
{h:10,n:"Viejos Chotos",l:"El Arcón"},
{h:12,n:"Música Domingo",l:"Operador"},
{h:14,n:"Sentidos",l:"Nicolás Fernandez"},
{h:16,n:"Retro Music",l:"Ezequiel Sanchez"},
{h:18,n:"Flashback",l:"Mario Dufour"},
{h:20,n:"Retro Hits Finde",l:"Operador"},
{h:22,n:"Noche de Domingo",l:"Operador"},
{h:1,n:"Trasnoche Domingo",l:"Sonar+"}

]

};

/* DIA */

let ahora=new Date();

let hora=
ahora.getHours() +
(ahora.getMinutes()/60);

let d=new Date().getDay();

/* CORRECCION REAL */

let hoy;

if(d==6){ // SABADO

if(hora >=0 && hora < 1.5){

hoy="Sabado";

}else if(hora >=1.5 && hora <6){

hoy="Sabado";

}else{

hoy="Sabado";

}

}else if(d==5){ // VIERNES

if(hora >=0 && hora <6){

hoy="Lunes a Viernes";

}else{

hoy="Lunes a Viernes";

}

}else{

hoy=
d==0?"Domingo":
d==6?"Sabado":
"Lunes a Viernes";

}

let prog=semanaData[hoy];

/* ACTUAL */

let actual=0;

for(let i=0;i<prog.length;i++){

let inicio=prog[i].h;

let fin=
(i<prog.length-1)
? prog[i+1].h
: 30;

let horaActual=hora;

if(horaActual < inicio){
horaActual += 24;
}

if(fin < inicio){
fin += 24;
}

if(horaActual >= inicio && horaActual < fin){
actual=i;
break;
}

}

/* PLAYER */

document.getElementById("progActual").innerText=
prog[actual].n;

document.getElementById("locActual").innerText=
"con "+prog[actual].l;

document.querySelector(".player")
.style.setProperty(
"--bg",
`url('${prog[actual].img || "https://i.imgur.com/CEC8OUS.png"}')`
);

/* TOP */

let topHTML="";

for(let i=0;i<3;i++){

let idx=(actual+i)%prog.length;

let p=prog[idx];

let estado=
i==0?"🔴 EN VIVO":
i==1?"⏭️ YA VIENE":
"🕓 DESPUÉS";

let horario=
p.h % 1 !==0
? (p.h===23.5?"23:30 HS":"01:30 HS")
: `${p.h}:00 HS`;

topHTML+=`

<div class="box ${i==0?'activo':''}"
style="--cardbg:url('${p.img || "https://i.imgur.com/CEC8OUS.png"}')">

<div class="estado">
${estado}
</div>

<div>
${horario}
</div>

<div>
${p.n}
</div>

<div>
${p.l}
</div>

</div>

`;

}

document.getElementById("top3").innerHTML=topHTML;

/* PROGRAMACION */

let semanaHTML="";

for(let dia in semanaData){

semanaHTML+=`
<div class="dia">
<h3>${dia}</h3>
`;

semanaData[dia].forEach((p,i)=>{

let activo=
(dia===hoy && i===actual)
?"activoProg":"";

let horario=
p.h % 1 !==0
? (p.h===23.5?"23:30 HS":"01:30 HS")
: `${p.h}:00 HS`;

semanaHTML+=`
<div class="item ${activo}">
${horario} - ${p.n} - ${p.l}
</div>
`;

});

semanaHTML+="</div>";

}

document.getElementById("semana").innerHTML=semanaHTML;

/* AUDIO */

let radio=document.getElementById("radio");
let btn=document.getElementById("btnPlay");

let playing=false;

function toggleRadio(){

if(!playing){

radio.play();

btn.innerHTML="■";

btn.classList.add("stop");

playing=true;

}else{

radio.pause();

radio.currentTime=0;

btn.innerHTML="▶";

btn.classList.remove("stop");

playing=false;

}

}

</script>

</body>
</html>
