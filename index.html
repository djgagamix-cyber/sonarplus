<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonar+</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:#050816;
color:white;
}

/* PLAYER */
.player{
position:relative;
text-align:center;
padding:35px 15px;
overflow:hidden;
border-radius:20px;
margin:10px;
background:#0d1638;
}

/* FONDO REAL */
.player-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(14px);
transform:scale(1.1);
opacity:.45;
z-index:0;
}

/* OSCURECER */
.player::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(5,8,22,.72);
z-index:1;
}

.player *{
position:relative;
z-index:2;
}

/* EN VIVO */
.live{
background:#ff2d55;
padding:6px 14px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-bottom:10px;
font-weight:bold;
}

/* TITULOS */
#progActual{
margin:5px 0;
font-size:28px;
}

#locActual{
margin-top:0;
color:#00cfff;
font-size:14px;
}

/* PLAY */
.btn-play{
margin:15px auto 0;
width:72px;
height:72px;
border-radius:50%;
background:linear-gradient(135deg,#00cfff,#6a00ff);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 25px rgba(0,200,255,.5);
}

.btn-play.stop{
background:linear-gradient(135deg,#ff004c,#ff2d55);
box-shadow:0 0 25px rgba(255,0,80,.6);
}

/* TOP 3 */
.top3{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

/* RECUADROS */
.box{
min-width:160px;
flex:1;
background:#0d1638;
border-radius:16px;
padding:15px;
position:relative;
overflow:hidden;
}

/* FONDO RECUADROS */
.box::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-image:var(--cardbg);
background-size:cover;
background-position:center;
filter:blur(4px);
transform:scale(1.1);
opacity:.45;
z-index:0;
}

.box *{
position:relative;
z-index:2;
}

.activo{
outline:2px solid #ff2d55;
}

.estado{
font-size:11px;
margin-bottom:6px;
color:#00cfff;
font-weight:bold;
}

/* PROGRAMACION */
.semana{
padding:15px;
}

.dia{
margin-bottom:20px;
}

.dia h3{
color:#00cfff;
margin-bottom:8px;
}

.item{
font-size:13px;
margin:3px 0;
opacity:.85;
padding:4px 6px;
border-radius:6px;
}

/* PROGRAMA ACTUAL */
.activoProg{
background:rgba(0,200,255,.12);
color:#00cfff;
font-weight:bold;
}

</style>
</head>

<body>

<!-- PLAYER -->
<div class="player">

<div class="player-bg" id="playerBg"></div>

<div class="live">
🔴 AHORA EN VIVO
</div>

<h2 id="progActual">
Cargando...
</h2>

<p id="locActual"></p>

<div class="btn-play" onclick="toggleRadio()" id="btnPlay">
▶
</div>

</div>

<audio id="radio" src="https://stream.zeno.fm/sctgo3gppjhtv"></audio>

<!-- TOP 3 -->
<div class="top3" id="top3"></div>

<!-- PROGRAMACION -->
<div class="semana" id="semana"></div>

<script>

// PROGRAMACION
const semanaData={

"Lunes a Viernes":[

{h:6,n:"Baladas en Español",l:"Sonar+",img:"https://picsum.photos/1200/700?1"},
{h:7,n:"Primer Round",l:"Nicolás Yacoy",img:"https://picsum.photos/1200/700?2"},
{h:9,n:"Café, amigos y música",l:"Mauro Hernandez y Barbie Torres",img:"https://i.imgur.com/DTJmuzd.png"},
{h:10,n:"Portal Argentina",l:"Juanjo Garone y Romina Fasani",img:"https://i.imgur.com/ziTZC8D.jpg"},
{h:12,n:"Melodías conocidas",l:"Sonar+",img:"https://i.imgur.com/825uO29.jpg"},
{h:14,n:"Nuestro Rock",l:"Sonar+",img:"https://picsum.photos/1200/700?6"},
{h:15,n:"Estudio Mega",l:"Matías Toledo",img:"https://picsum.photos/1200/700?7"},
{h:16,n:"Buenas Noticias",l:"Kily Cortes",img:"https://picsum.photos/1200/700?8"},
{h:18,n:"Rebeldes",l:"Hector Acosta y Natalia Ciliento",img:"https://picsum.photos/1200/700?9"},
{h:19,n:"Retro Hits",l:"Sonar+",img:"https://picsum.photos/1200/700?10"},
{h:21,n:"Playlist Libre",l:"Ramón Sosa",img:"https://picsum.photos/1200/700?11"},
{h:23,n:"Noche Sonar+",l:"El Nocturno",img:"https://picsum.photos/1200/700?12"},
{h:1,n:"Trasnoche",l:"Sonar+",img:"https://picsum.photos/1200/700?13"}

],

"Sabado":[

"Sabado":[

{h:6,n:"Folklore Argentino",l:"Sonar+",img:"https://picsum.photos/1200/700?14"},

{h:7,n:"Aire de Campo",l:"César Tapia",img:"https://picsum.photos/1200/700?15"},

{h:9,n:"Ecos del Alma",l:"Valeria Mitelman",img:"https://picsum.photos/1200/700?16"},

{h:10,n:"Portal Argentina Finde",l:"Juanjo Garone",img:"https://picsum.photos/1200/700?17"},

{h:12,n:"Música Sonar+",l:"Operador",img:"https://picsum.photos/1200/700?18"},

{h:14,n:"La Puerta de al Lado",l:"Diego Mait",img:"https://picsum.photos/1200/700?19"},

{h:16,n:"Versiones",l:"Mili Pouzo",img:"https://picsum.photos/1200/700?20"},

{h:18,n:"Buenas Noticias",l:"Kily Cortes",img:"https://picsum.photos/1200/700?21"},

{h:22,n:"Ranking Sonar+",l:"Gabriel Retamozo",img:"https://i.imgur.com/OSy7BbG.png"},

{h:23.5,n:"Radio Mix",l:"DJ Mono",img:"https://i.imgur.com/i8DorBr.jpg"},

{h:1.5,n:"Trasnoche Finde",l:"Sonar+",img:"https://picsum.photos/1200/700?24"}

],

"Domingo":[

{h:6,n:"América y su Folklore",l:"Nicolás Fernandez",img:"https://picsum.photos/1200/700?25"},
{h:8,n:"Nuestro Día",l:"Miguel Calderón",img:"https://picsum.photos/1200/700?26"},
{h:10,n:"Viejos Chotos",l:"El Arcón",img:"https://picsum.photos/1200/700?27"},
{h:12,n:"Música Domingo",l:"Operador",img:"https://picsum.photos/1200/700?28"},
{h:14,n:"Sentidos",l:"Nicolás Fernandez",img:"https://picsum.photos/1200/700?29"},
{h:16,n:"Retro Music",l:"Ezequiel Sanchez",img:"https://picsum.photos/1200/700?30"},
{h:18,n:"Flashback",l:"Mario Dufour",img:"https://picsum.photos/1200/700?31"},
{h:20,n:"Retro Hits Finde",l:"Operador",img:"https://picsum.photos/1200/700?32"},
{h:22,n:"Noche de Domingo",l:"Operador",img:"https://picsum.photos/1200/700?33"},
{h:1,n:"Trasnoche Domingo",l:"Sonar+",img:"https://picsum.photos/1200/700?34"}

]

};

// DIA
let d=new Date().getDay();

let hoy=
d==0?"Domingo":
d==6?"Sabado":
"Lunes a Viernes";

let prog=semanaData[hoy];
let hora=new Date().getHours();

// ACTUAL
let actual=prog.length-1;

/* CORRECCION MADRUGADA */

for(let i=0;i<prog.length;i++){

let inicio=prog[i].h;

let fin;

if(i < prog.length-1){

fin = prog[i+1].h;

if(fin < inicio){
fin += 24;
}

}else{

fin = 24;

}

let horaActual = hora;

if(horaActual < inicio){
horaActual += 24;
}

if(horaActual >= inicio && horaActual < fin){
actual = i;
break;
}

}

// INFO PLAYER
document.getElementById("progActual").innerText=prog[actual].n;

document.getElementById("locActual").innerText=
"con "+prog[actual].l;

// IMAGEN PLAYER
document.getElementById("playerBg").style.backgroundImage=
`url('${prog[actual].img}')`;

// TOP 3
let topHTML="";

for(let i=0;i<3;i++){

let p=prog[actual+i];

if(!p) continue;

let estado=
i==0?"🔴 EN VIVO":
i==1?"⏭️ YA VIENE":
"🕓 LUEGO";

topHTML+=`

<div class="box ${i==0?'activo':''}" 
style="--cardbg:url('${p.img}')">

<div class="estado">
${estado}
</div>

<div>
${p.h}:00 HS
</div>

<div>
${p.n}
</div>

<div>
${p.l}
</div>

</div>

`;

}

document.getElementById("top3").innerHTML=topHTML;

// GRILLA
let semanaHTML="";

for(let dia in semanaData){

semanaHTML+=`
<div class="dia">
<h3>${dia}</h3>
`;

semanaData[dia].forEach((p,i)=>{

let activo=
(dia===hoy && i===actual)
?"activoProg":"";

semanaHTML+=`
<div class="item ${activo}">
${p.h}:00 HS - ${p.n}
</div>
`;

});

semanaHTML+="</div>";

}

document.getElementById("semana").innerHTML=semanaHTML;

// AUDIO
let radio=document.getElementById("radio");
let btn=document.getElementById("btnPlay");
let playing=false;

function toggleRadio(){

if(!playing){

radio.play();

btn.innerHTML="■";

btn.classList.add("stop");

playing=true;

}else{

radio.pause();

radio.currentTime=0;

btn.innerHTML="▶";

btn.classList.remove("stop");

playing=false;

}

}

</script>

</body>
</html>
